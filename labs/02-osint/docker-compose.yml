name: penlearn-osint

# Passive OSINT lab — a local DNS resolver and small web server pre-seeded with
# data for a fictitious target domain (acme-fake.local). Lets you practice
# osint-passive.sh end-to-end without external interaction.

services:
  resolver:
    image: cytopia/bind:stable
    container_name: penlearn-osint-resolver
    hostname: resolver
    volumes:
      - ./targets/zones:/etc/bind/zones:ro
      - ./targets/named.conf:/etc/bind/named.conf:ro
    networks:
      osint:
        ipv4_address: 10.50.0.10
    mem_limit: 256m
    cpus: '0.5'

  webserver:
    image: nginx:1.27-alpine
    container_name: penlearn-osint-web
    volumes:
      - ./targets/www:/usr/share/nginx/html:ro
      - ./targets/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      osint:
        ipv4_address: 10.50.0.20
    mem_limit: 128m
    cpus: '0.5'

networks:
  osint:
    driver: bridge
    internal: true   # NO host egress — purely local
    ipam:
      config:
        - subnet: 10.50.0.0/24
